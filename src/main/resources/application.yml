server:
  port: 8667

spring:
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: {YOUR_NEO4J_PASSWORD}
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/Linker
    driver-class-name: org.postgresql.Driver
    username: postgresql
    password: {YOUR_DB_PASSWORD}
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    requested-heartbeat: 600
    connection-timeout: 60000
    listener:
      simple:
        concurrency: 1
        max-attempts: 1
        ack-mode: manual
  application:
    name: tripmate-spring-ai
  ai:
    minimax:
      api-key: {YOUR_API_KEY}
      chat:
        options:
          model: MiniMax-M2.7
          temperature: 0.7
      embedding:
        api-key: {YOUR_API_KEY}
        options:
          model: embo-01
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: true
#    mcp:
#      client:
#        enabled: true
#        streamable-http:
#          connections:
#            xxx:
#              url: xxxx
#            xxx:
#              url: xxxx
#        request-timeout: 30s
    retry:
      max-attempts: 3

mybatis-plus:
  type-handlers-package: com.sean.linker.infrastructure.typehandler
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    # Spring AI 核心:看 ChatClient、ChatModel 的请求和响应
    org.springframework.ai: DEBUG
    # Spring AI 工具调用:看 tool calling 的过程(包括 SkillsTool)
    org.springframework.ai.chat.client: DEBUG
    org.springframework.ai.tool: DEBUG
    org.springframework.ai.model.tool: DEBUG
    # spring-ai-agent-utils 的 SkillsTool 自身日志
    org.springaicommunity: DEBUG
    # SimpleLoggerAdvisor:记录完整的 ChatClient 请求(prompt/tool calls)和响应
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG
    # RateLimitedToolCallback:记录 MCP tool call 的入参和返回值
    com.sean.tripmatespringai.config.com.sean.tripmatespringai.toolCallBack.RateLimitedToolCallback: DEBUG
